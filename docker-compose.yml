services:
  api:
    build: ./Api
    container_name: codebox-api
    ports:
      - "3000:3000" 
    depends_on:
      - worker      

  worker:
    build: ./Worker
    container_name: rce-worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/coderunner:/tmp/coderunner
    restart: unless-stopped